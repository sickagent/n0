services:
  nats:
    image: nats:2.10-alpine
    container_name: n0-nats
    command: "-js -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data/jetstream
    networks:
      - n0-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: n0-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meta
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - n0-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meta"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: n0-clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - n0-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: n0-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meta
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - n0-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: n0-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - n0-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meta-service:
    build:
      context: ..
      dockerfile: services/meta-service/Dockerfile
    image: n0/meta-service:latest
    container_name: n0-meta-service
    env_file:
      - ../.env
    environment:
      APP_NAME: meta-service
      LOG_LEVEL: info
      GRPC_ADDR: :8080
      HTTP_ADDR: :8081
    ports:
      - "8080:8080"
      - "8085:8081"
      - "9090:9090"
    networks:
      - n0-net
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  connection-manager:
    build:
      context: ..
      dockerfile: services/connection-manager/Dockerfile
    image: n0/connection-manager:latest
    container_name: n0-connection-manager
    env_file:
      - ../.env
    environment:
      APP_NAME: connection-manager
      LOG_LEVEL: info
      GRPC_ADDR: :8080
      HTTP_ADDR: :8082
    ports:
      - "8081:8080"
      - "8086:8082"
      - "9091:9090"
    networks:
      - n0-net
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mysql:
        condition: service_healthy

  query-engine:
    build:
      context: ..
      dockerfile: services/query-engine/Dockerfile
    image: n0/query-engine:latest
    container_name: n0-query-engine
    env_file:
      - ../.env
    environment:
      APP_NAME: query-engine
      LOG_LEVEL: info
      GRPC_ADDR: :8080
      HTTP_ADDR: :8082
      WORKER_COUNT: "4"
    ports:
      - "8082:8080"
      - "8087:8082"
      - "9092:9090"
    networks:
      - n0-net
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-gateway:
    build:
      context: ..
      dockerfile: services/agent-gateway/Dockerfile
    image: n0/agent-gateway:latest
    container_name: n0-agent-gateway
    env_file:
      - ../.env
    environment:
      APP_NAME: agent-gateway
      LOG_LEVEL: info
      GRPC_ADDR: :8080
      HTTP_ADDR: :8081
    ports:
      - "8083:8081"
      - "8084:8080"
      - "9093:9090"
    networks:
      - n0-net
    depends_on:
      nats:
        condition: service_healthy

  web-admin:
    build:
      context: ../services/web-admin
      dockerfile: Dockerfile
    image: n0/web-admin:latest
    container_name: n0-web-admin
    ports:
      - "3000:80"
    networks:
      - n0-net
    depends_on:
      - agent-gateway

volumes:
  nats-data:
  postgres-data:
  clickhouse-data:
  mysql-data:
  redis-data:

networks:
  n0-net:
    driver: bridge
